services:
  - type: web
    name: freshstart-parser
    runtime: python
    rootDir: .
    buildCommand: pip install -r parser/requirements.txt
    startCommand: uvicorn parser.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
